services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROJECT_DIR: /app
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3010,http://127.0.0.1:3010}
      API_CORS_ORIGIN_REGEX: ${API_CORS_ORIGIN_REGEX:-^http://(localhost|127\\.0\\.0\\.1|100\\.\\d+\\.\\d+\\.\\d+)(:3010)$}
      DATABASE_PATH: /data/subscriptions.sqlite3
      SUBSCRIPTION_ENV_DIR: /data/env
      SUBSCRIPTION_OUTPUT_DIR: /data/outputs
    ports:
      - "8010:8000"
    volumes:
      - daily_briefing_private_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/health', timeout=5)); raise SystemExit(0 if data.get('ok') else 1)"]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL-}
    ports:
      - "3010:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 20s

volumes:
  daily_briefing_private_data:
